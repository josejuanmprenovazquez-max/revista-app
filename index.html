<!-- ===== SECCIÓN PRO MAX ===== -->
<section style="max-width:1000px;margin:100px auto;padding:30px;background:linear-gradient(145deg,#020617,#0f172a);border-radius:20px;box-shadow:0 0 40px rgba(0,0,0,0.8);">

<h2 style="text-align:center;font-size:32px;margin-bottom:20px;background:linear-gradient(90deg,#3b82f6,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
🔥 Fire TV Stick Ultimate Guide
</h2>

<p style="color:#cbd5f5;">
Learn how to install the best apps on your Fire TV Stick safely and easily. This guide is designed for beginners and advanced users who want unlimited entertainment.
</p>

<!-- BOTONES -->
<div style="display:flex;justify-content:center;gap:20px;margin:40px 0;flex-wrap:wrap;">

<a href="revista/index.html" class="button">📲 View Apps</a>

<button onclick="openModal()" class="button" style="background:#00c853;">
🎥 Watch Tutorial
</button>

</div>

</section>

<!-- ===== MODAL VIDEO (TIPO NETFLIX) ===== -->
<div id="videoModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:999;">

<div style="width:90%;max-width:800px;position:relative;">
<span onclick="closeModal()" style="position:absolute;top:-40px;right:0;font-size:30px;color:white;cursor:pointer;">✖</span>

<video width="100%" controls>
<source src="tutorial.mp4" type="video/mp4">
</video>

</div>
</div>

<!-- ===== CONTADOR DE VISITAS ===== -->
<div style="text-align:center;margin-top:40px;color:#94a3b8;">
👀 Visits: <span id="visitCount"></span>
</div>

<!-- ===== COMENTARIOS GUARDADOS ===== -->
<section style="max-width:800px;margin:60px auto;padding:25px;background:#020617;border-radius:15px;">

<h2 style="text-align:center;">💬 Comments</h2>

<input id="name3" placeholder="Your name" style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:none;">
<textarea id="comment3" placeholder="Write your comment..." style="width:100%;padding:12px;height:100px;border-radius:8px;border:none;"></textarea>

<button onclick="saveComment()" class="button" style="margin-top:10px;">
Post Comment
</button>

<div id="commentsContainer" style="margin-top:20px;"></div>

</section>

<!-- ===== SCRIPT PRO ===== -->
<script>

// 🎥 MODAL VIDEO
function openModal(){
    document.getElementById("videoModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("videoModal").style.display = "none";
}

// 👀 CONTADOR VISITAS
let visits = localStorage.getItem("visits");
visits = visits ? parseInt(visits) + 1 : 1;
localStorage.setItem("visits", visits);
document.getElementById("visitCount").innerText = visits;

// 💬 COMENTARIOS GUARDADOS
function loadComments(){
    let comments = JSON.parse(localStorage.getItem("comments")) || [];
    let container = document.getElementById("commentsContainer");
    container.innerHTML = "";

    comments.forEach(c => {
        let div = document.createElement("div");
        div.style.background = "#111827";
        div.style.padding = "10px";
        div.style.marginTop = "10px";
        div.style.borderRadius = "8px";
        div.innerHTML = "<strong>" + c.name + "</strong><br>" + c.text;
        container.appendChild(div);
    });
}

function saveComment(){
    let name = document.getElementById("name3").value;
    let text = document.getElementById("comment3").value;

    if(name === "" || text === ""){
        alert("Fill all fields");
        return;
    }

    let comments = JSON.parse(localStorage.getItem("comments")) || [];
    comments.push({name:name, text:text});
    localStorage.setItem("comments", JSON.stringify(comments));

    document.getElementById("name3").value = "";
    document.getElementById("comment3").value = "";

    loadComments();
}

loadComments();

</script>
